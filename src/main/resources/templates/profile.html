<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BICAP</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">BICAP</div>
        <nav>
            <a th:href="@{/dashboard}">Dashboard</a>
            <a class="active" th:href="@{/profile}">Profile</a>
        </nav>
        <form th:action="@{/logout}" method="post">
            <button class="danger" type="submit">Đăng xuất</button>
        </form>
    </aside>

    <main class="content">
        <h1>Hồ sơ cá nhân</h1>
        <p class="muted">Cập nhật thông tin người dùng bằng form Java MVC.</p>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${profileError}" th:text="${profileError}"></div>

        <div class="cards">
            <section class="card">
                <h3>Thông tin hiện tại</h3>
                <ul class="info-list">
                    <li><strong>Họ tên:</strong> <span th:text="${user.fullName}"></span></li>
                    <li><strong>Email:</strong> <span th:text="${user.email}"></span></li>
                    <li><strong>SĐT:</strong> <span th:text="${user.phone ?: 'Chưa cập nhật'}"></span></li>
                    <li><strong>Avatar URL:</strong> <span th:text="${user.avatarUrl ?: 'Chưa cập nhật'}"></span></li>
                </ul>
            </section>

            <section class="card">
                <h3>Cập nhật hồ sơ</h3>
                <form th:action="@{/profile}" th:object="${profileForm}" method="post" class="form-grid">
                    <label>
                        <span>Họ và tên</span>
                        <input type="text" th:field="*{fullName}">
                        <small class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
                    </label>

                    <label>
                        <span>Số điện thoại</span>
                        <input type="text" th:field="*{phone}">
                        <small class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
                    </label>

                    <label>
                        <span>Avatar URL</span>
                        <input type="text" th:field="*{avatarUrl}">
                        <small class="field-error" th:if="${#fields.hasErrors('avatarUrl')}" th:errors="*{avatarUrl}"></small>
                    </label>

                    <button type="submit">Lưu thay đổi</button>
                </form>
            </section>
        </div>
    </main>
</div>
</body>
</html>
