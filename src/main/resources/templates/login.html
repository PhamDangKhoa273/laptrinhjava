<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BICAP</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-shell">
    <div class="card auth-card">
        <div class="brand">BICAP</div>
        <h1>Đăng nhập</h1>
        <p class="muted">Giao diện Java Spring Boot + Thymeleaf</p>

        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert error" th:if="${loginError}" th:text="${loginError}"></div>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="form-grid">
            <label>
                <span>Email</span>
                <input type="email" th:field="*{email}" placeholder="you@example.com">
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>

            <label>
                <span>Mật khẩu</span>
                <input type="password" th:field="*{password}" placeholder="******">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>

            <button type="submit">Đăng nhập</button>
        </form>

        <p class="footer-text">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký</a></p>
    </div>
</div>
</body>
</html>
