services:
  thor:
    image: ghcr.io/vechain/thor:v2.1.0
    container_name: bicap-thor
    restart: unless-stopped
    ports:
      - "8669:8669"
    command:
      - solo
      - --on-demand
      - --api-addr
      - 0.0.0.0:8669
      - --gas-limit
      - "10000000000000"
      - --api-call-gas-limit
      - "1000000000"
      - --verbosity
      - "3"
    volumes:
      - thor_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8669/blocks/best"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: bicap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4
    container_name: bicap-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.local or your shell}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bicap_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bicap-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-bicap_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.local or your shell}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET in .env.local or your shell}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_JWT_REFRESH_EXPIRATION_MS: ${APP_JWT_REFRESH_EXPIRATION_MS:-604800000}
      APP_SUBSCRIPTION_GATEWAY_SECRET: ${APP_SUBSCRIPTION_GATEWAY_SECRET:-change-me}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      VECHAIN_THOR_URL: http://thor:8669
      VECHAIN_THOR_ENABLED: "true"
      VECHAIN_THOR_DEV_PRIVATE_KEY: ${VECHAIN_THOR_DEV_PRIVATE_KEY:?set VECHAIN_THOR_DEV_PRIVATE_KEY in .env.local or your shell}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: bicap-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
  thor_data:
