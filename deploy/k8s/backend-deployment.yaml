apiVersion: apps/v1
kind: Deployment
metadata:
  name: bicap-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bicap-backend
  template:
    metadata:
      labels:
        app: bicap-backend
    spec:
      containers:
        - name: backend
          image: bicap-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: bicap-backend-secrets
            - configMapRef:
                name: bicap-backend-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
