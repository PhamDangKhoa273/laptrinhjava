apiVersion: v1
kind: Secret
metadata:
  name: bicap-backend-secrets
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bicap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: replace-with-database-password
  APP_JWT_SECRET: replace-with-strong-random-secret
  APP_ORDER_DEPOSIT_GATEWAY_SECRET: replace-with-payment-secret
  APP_SUBSCRIPTION_GATEWAY_SECRET: replace-with-subscription-secret
  BLOCKCHAIN_PRIVATE_KEY: ""
  BLOCKCHAIN_RPC_URL: ""
  BLOCKCHAIN_CONTRACT_ADDRESS: ""
  VECHAIN_THOR_DEV_PRIVATE_KEY: ""
  VECHAIN_THOR_URL: ""
  VECHAIN_THOR_TO_ADDRESS: ""
