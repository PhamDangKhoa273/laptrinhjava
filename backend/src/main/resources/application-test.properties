spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:bicap_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.cors.allowed-origins=http://localhost:5173
app.frontend.url=http://localhost:5173
app.media.upload-dir=uploads-test
app.media.max-file-size-bytes=5242880

spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=localhost
spring.mail.properties.mail.smtp.connectiontimeout=2000
spring.mail.properties.mail.smtp.timeout=2000
spring.mail.properties.mail.smtp.writetimeout=2000

blockchain.enabled=false
vechain.thor.enabled=false
