spring.profiles.active=local

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bicap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
spring.flyway.out-of-order=${SPRING_FLYWAY_OUT_OF_ORDER:true}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.demo.seed-enabled=${APP_DEMO_SEED_ENABLED:true}
app.demo.password=${APP_DEMO_PASSWORD:123456}
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:uploads}
app.media.max-file-size-bytes=${APP_MEDIA_MAX_FILE_SIZE_BYTES:5242880}

spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}

blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
vechain.thor.enabled=${VECHAIN_THOR_ENABLED:false}
