spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bicap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}
spring.flyway.out-of-order=${SPRING_FLYWAY_OUT_OF_ORDER:false}

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
# Override per profile in application-local/test/staging/prod as needed
spring.main.allow-bean-definition-overriding=true

# Mail configuration
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}

# App custom properties
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.demo.seed-enabled=${APP_DEMO_SEED_ENABLED:false}
app.demo.password=${APP_DEMO_PASSWORD:}
app.errors.include-stacktrace=${APP_ERRORS_INCLUDE_STACKTRACE:false}
app.media.upload-dir=${APP_MEDIA_UPLOAD_DIR:uploads}
app.media.max-file-size-bytes=${APP_MEDIA_MAX_FILE_SIZE_BYTES:5242880}


app.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:30}
app.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:60}
app.order.dispute-window-hours=${APP_ORDER_DISPUTE_WINDOW_HOURS:24}
app.order.deposit.gateway-secret=${APP_ORDER_DEPOSIT_GATEWAY_SECRET:}
app.subscription.gateway-secret=${APP_SUBSCRIPTION_GATEWAY_SECRET:}


spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5MB}

# Cache / Redis
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Actuator / Observability (basic)
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSE:health,info,metrics,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:when_authorized}
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# Blockchain configuration
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.rpc-url=${BLOCKCHAIN_RPC_URL:}
blockchain.private-key=${BLOCKCHAIN_PRIVATE_KEY:}
blockchain.contract-address=${BLOCKCHAIN_CONTRACT_ADDRESS:}
blockchain.chain-id=${BLOCKCHAIN_CHAIN_ID:11155111}

# Blockchain worker
blockchain.worker.fixed-delay-ms=${BLOCKCHAIN_WORKER_FIXED_DELAY_MS:5000}

# Local Hardhat defaults (dev only)
# export BLOCKCHAIN_ENABLED=true
# export BLOCKCHAIN_RPC_URL=http://127.0.0.1:8545
# export BLOCKCHAIN_PRIVATE_KEY=<use hardhat account #0 private key>
# export BLOCKCHAIN_CHAIN_ID=31337
# export BLOCKCHAIN_CONTRACT_ADDRESS=<deployed address>

# VeChainThor (DEV)
vechain.thor.enabled=${VECHAIN_THOR_ENABLED:false}
vechain.thor.url=${VECHAIN_THOR_URL:http://localhost:8669}
vechain.thor.dev-private-key=${VECHAIN_THOR_DEV_PRIVATE_KEY:}
vechain.thor.to-address=${VECHAIN_THOR_TO_ADDRESS:0x0000000000000000000000000000000000000000}

