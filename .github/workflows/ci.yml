name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven wrapper
        run: ./mvnw -version

      - name: Check migrations exist
        run: test -d src/main/resources/db/migration && test "$(find src/main/resources/db/migration -name 'V*.sql' | wc -l)" -gt 0

      - name: Check README seed/demo alignment
        run: |
          grep -q 'admin@bicap.com' ../README.md
          grep -q 'farm@bicap.com' ../README.md
          grep -q 'retailer@bicap.com' ../README.md
          grep -q 'manager@bicap.com' ../README.md
          grep -q 'driver@bicap.com' ../README.md
          grep -q 'guest@bicap.com' ../README.md

      - name: Backend test
        run: ./mvnw test -DskipITs -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
